name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install build + test deps
        run: |
          python -m pip install --upgrade pip
          pip install maturin pytest pytest-asyncio fastapi httpx pyyaml mypy ruff build twine
          pip install -e '.[litellm,otel]'

      - name: Build the Rust core (abi3)
        # `maturin develop` requires a virtualenv, which the CI runner doesn't
        # have (deps install into the system interpreter). Build the wheel and
        # pip-install it instead — same artifact, venv-independent.
        run: |
          maturin build -m yaab-core/Cargo.toml --release --out dist-rust
          pip install dist-rust/*.whl

      - name: Lint (ruff)
        run: |
          ruff check yaab/ tests/ examples/ samples/
          ruff format --check yaab/ tests/ samples/

      - name: Type check (mypy)
        run: mypy yaab/

      - name: Test (Rust backend)
        run: pytest -q

      - name: Test (pure-Python fallback)
        env:
          YAAB_NO_RUST: "1"
        run: pytest -q

      - name: Build sdist + wheel (yaab) and check
        run: |
          python -m build
          twine check dist/*

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo fmt
        run: cargo fmt --manifest-path yaab-core/Cargo.toml --check
      - name: cargo clippy
        run: cargo clippy --manifest-path yaab-core/Cargo.toml -- -D warnings
