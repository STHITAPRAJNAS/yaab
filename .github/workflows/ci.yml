name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install build + test deps
        run: |
          python -m pip install --upgrade pip
          pip install maturin pytest pytest-asyncio fastapi httpx
          pip install -e '.[litellm,otel]'

      - name: Build the Rust core
        run: maturin develop -m yaab-core/Cargo.toml --release

      - name: Test (Rust backend)
        run: pytest -q

      - name: Test (pure-Python fallback)
        env:
          YAAB_NO_RUST: "1"
        run: pytest -q

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo fmt
        run: cargo fmt --manifest-path yaab-core/Cargo.toml --check
      - name: cargo clippy
        run: cargo clippy --manifest-path yaab-core/Cargo.toml -- -D warnings
