name: Release

# Publish to PyPI on a version tag (e.g. v0.1.0) cut from the `main` release
# branch. Builds the yaab-core abi3 wheels for all platforms + the pure-Python
# `yaab-sdk` wheel/sdist, then publishes via Trusted Publishing (OIDC) — no API
# token stored.
#
# PyPI trusted publishers (one per project, both -> this repo + release.yml):
#   yaab-sdk   : the SDK (import name stays `yaab`, CLI stays `yaab`)
#   yaab-core  : the optional Rust accelerator wheel
#
# Release process (see RELEASING.md):
#   1. Merge develop -> main
#   2. git tag vX.Y.Z on main && git push origin vX.Y.Z
# The preflight job refuses tags whose commit is not on main or whose version
# doesn't match pyproject.toml, so a stray tag on develop can never publish.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  preflight:
    name: Verify release tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Tag commit must be on main
        if: github.ref_type == 'tag'
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Tag $GITHUB_REF_NAME points to a commit that is not on main." \
                 "Releases are cut from the main branch (see RELEASING.md)." >&2
            exit 1
          fi

      - name: Tag must match pyproject version
        if: github.ref_type == 'tag'
        run: |
          PKG_VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match pyproject version $PKG_VERSION" >&2
            exit 1
          fi

  # yaab-core: one abi3 wheel per OS/arch (works on CPython 3.11+).
  core-wheels:
    name: yaab-core wheels (${{ matrix.platform.target }})
    needs: [preflight]
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { os: ubuntu-latest,  target: x86_64 }
          - { os: ubuntu-latest,  target: aarch64 }
          - { os: macos-latest,   target: aarch64 }
          # Intel macOS wheels cross-compile from the ARM runner (the dedicated
          # Intel runners are retired and jobs targeting them never start).
          - { os: macos-latest,   target: x86_64 }
          - { os: windows-latest, target: x64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build abi3 wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist -m yaab-core/Cargo.toml
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: core-${{ matrix.platform.os }}-${{ matrix.platform.target }}
          path: dist/*.whl

  core-sdist:
    name: yaab-core sdist
    needs: [preflight]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist -m yaab-core/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: core-sdist
          path: dist/*.tar.gz

  # yaab-sdk: the pure-Python package (wheel + sdist). Import name stays `yaab`.
  sdk-dist:
    name: yaab-sdk sdist + wheel
    needs: [preflight]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*

      - name: Smoke-test the built wheel
        # `pip install yaab-sdk` must yield a working `import yaab` and `yaab` CLI.
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install dist/*.whl
          /tmp/smoke/bin/python -c "import yaab; from yaab import Agent; print('import ok:', yaab.__version__, yaab.BACKEND)"
          /tmp/smoke/bin/yaab info

      - uses: actions/upload-artifact@v4
        with:
          name: sdk-dist
          path: dist/*

  publish-core:
    name: Publish yaab-core to PyPI
    needs: [core-wheels, core-sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: core-*
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Idempotent re-runs: files already on PyPI are skipped, not errors.
          skip-existing: true

  # Publishes independently of yaab-core so the SDK ships even if the core
  # publish fails (the `rust` extra simply resolves once core is published).
  publish-sdk:
    name: Publish yaab-sdk to PyPI
    needs: [sdk-dist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: sdk-dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Idempotent re-runs: files already on PyPI are skipped, not errors.
          skip-existing: true

  github-release:
    name: GitHub release
    needs: [publish-sdk]
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: sdk-dist
          path: dist
      - name: Create GitHub release with artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
